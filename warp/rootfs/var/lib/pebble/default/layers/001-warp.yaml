---
services:
  warp-svc:
    command: /usr/bin/warp-svc
    override: replace
    startup: enabled
    group: root
    user: root

  warp-connect:
    command: /usr/local/bin/warp-connect.sh
    override: replace
    on-success: ignore
    after:
      - warp-svc
    startup: enabled
    group: root
    user: root
